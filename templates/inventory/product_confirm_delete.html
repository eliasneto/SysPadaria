{% extends "base.html" %}
{% block title %}Excluir produto | SysPadaria{% endblock %}
{% block content %}
<div class="sys-card rounded-4 p-3 p-md-4">
  <h1 class="h4 mb-2">Excluir produto</h1>
  <p class="sys-helper mb-4">Tem certeza que deseja excluir <strong>{{ object.name }}</strong>?</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-danger rounded-4">Confirmar exclusão</button>
    <a href="{% url 'inventory-home' %}" class="btn btn-outline-secondary rounded-4">Cancelar</a>
  </form>
</div>
{% endblock %}
