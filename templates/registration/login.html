{% extends "base.html" %}
{% load static %}
{% block title %}Login | SysPadaria{% endblock %}
{% block content %}
<div class="container py-4 py-lg-5 sys-login-shell">
  <div class="row justify-content-center align-items-center g-4">
    <div class="col-12 col-lg-5">
      <div class="sys-card sys-login-panel p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="sys-logo-box mb-3">
            <img src="{% static 'img/logo-mark.svg' %}" alt="Logomarca da padaria">
          </div>
          <h1 class="h3 sys-login-title mb-2">Entrar no sistema</h1>
          <p class="sys-helper mb-0">Acesso rápido para operar caixa, estoque e financeiro.</p>
        </div>

        <form method="post" class="vstack gap-3">
          {% csrf_token %}
          <div>
            <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">Usuário</label>
            <input
              type="text"
              name="{{ form.username.html_name }}"
              id="{{ form.username.id_for_label }}"
              class="form-control sys-input"
              autocomplete="username"
              required
            >
          </div>
          <div>
            <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">Senha</label>
            <input
              type="password"
              name="{{ form.password.html_name }}"
              id="{{ form.password.id_for_label }}"
              class="form-control sys-input"
              autocomplete="current-password"
              required
            >
          </div>
          {% if form.non_field_errors %}
            <div class="alert alert-danger py-2 mb-0">
              {{ form.non_field_errors }}
            </div>
          {% endif %}
          <button class="btn btn-sys-primary btn-lg w-100" type="submit">Acessar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
